trigger:
  branches:
    include:
      - main
  paths:
    include:
      - frontend/**

variables:
  - group: taskpro-secrets
  - name: imageRepository
    value: taskpro-frontend
  - name: dockerfilePath
    value: frontend/Dockerfile
  - name: tag
    value: $(Build.BuildId)

stages:
  # ─────────────────────────────────────────────
  - stage: Build
    displayName: Build & Type Check
    jobs:
      - job: BuildFrontend
        displayName: npm build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Use Node 20
            inputs:
              versionSpec: 20.x

          - script: npm ci
            workingDirectory: frontend
            displayName: Install dependencies

          - script: npm run build
            workingDirectory: frontend
            displayName: Next.js production build
            env:
              NEXT_PUBLIC_API_URL: $(NEXT_PUBLIC_API_URL)

  # ─────────────────────────────────────────────
  - stage: Docker
    displayName: Build & Push Docker Image
    dependsOn: Build
    jobs:
      - job: DockerBuildPush
        displayName: Build & push to ACR
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build and push frontend image
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              buildContext: frontend
              containerRegistry: $(ACR_SERVICE_CONNECTION)
              tags: |
                $(tag)
                latest

  # ─────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: Docker
    jobs:
      - deployment: DeployFrontend
        displayName: Deploy frontend App Service
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: Deploy container to App Service
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(FRONTEND_APP_SERVICE_NAME)
                    containers: $(ACR_LOGIN_SERVER)/$(imageRepository):$(tag)
