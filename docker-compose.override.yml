# Overrides para desarrollo local — hot reload y puertos adicionales
services:
  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ./backend:/src
    command: ["dotnet", "watch", "run", "--project", "02.Service/API/API.csproj"]

  frontend:
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["sh", "-c", "if [ ! -x node_modules/.bin/next ]; then npm ci; fi; npm run dev"]

volumes:
  frontend_node_modules:
  frontend_next:
