services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskpro-sqlserver
    environment:
      SA_PASSWORD: "TaskPro@2024!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TaskPro@2024!' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: taskpro-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskpro-backend
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=TaskProDb;User Id=sa;Password=TaskPro@2024!;TrustServerCertificate=True;"
      ConnectionStrings__MongoDB: "mongodb://mongodb:27017"
      MongoDB__DatabaseName: "taskpro"
      Jwt__Key: "TaskPro-Dev-SuperSecretKey-2024-MustBe32CharsMin!"
      Jwt__Issuer: "taskpro-api"
      Jwt__Audience: "taskpro-client"
      Jwt__ExpiresMinutes: "60"
      Origins: "http://localhost:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_DEVEXTREME_LICENSE_KEY: "${NEXT_PUBLIC_DEVEXTREME_LICENSE_KEY}"
    container_name: taskpro-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_DEVEXTREME_LICENSE_KEY: "${NEXT_PUBLIC_DEVEXTREME_LICENSE_KEY}"
    depends_on:
      - backend

volumes:
  sqlserver_data:
  mongodb_data:
