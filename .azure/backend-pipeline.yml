trigger:
  branches:
    include:
      - main
  paths:
    include:
      - backend/**

variables:
  - group: taskpro-secrets          # Variable group in Azure DevOps
  - name: imageRepository
    value: taskpro-backend
  - name: dockerfilePath
    value: backend/Dockerfile
  - name: tag
    value: $(Build.BuildId)

stages:
  # ─────────────────────────────────────────────
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildTest
        displayName: dotnet build + test
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UseDotNet@2
            displayName: Use .NET 8
            inputs:
              packageType: sdk
              version: 8.x

          - script: dotnet restore backend/taskpro.sln
            displayName: Restore packages

          - script: dotnet build backend/taskpro.sln --no-restore -c Release
            displayName: Build solution

          - script: dotnet test backend/taskpro.sln --no-build -c Release --logger trx --results-directory $(Agent.TempDirectory)/TestResults
            displayName: Run tests

          - task: PublishTestResults@2
            displayName: Publish test results
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/*.trx'
              searchFolder: $(Agent.TempDirectory)/TestResults
            condition: always()

  # ─────────────────────────────────────────────
  - stage: Docker
    displayName: Build & Push Docker Image
    dependsOn: Build
    jobs:
      - job: DockerBuildPush
        displayName: Build & push to ACR
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build and push backend image
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              buildContext: backend
              containerRegistry: $(ACR_SERVICE_CONNECTION)
              tags: |
                $(tag)
                latest

  # ─────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: Docker
    jobs:
      - deployment: DeployBackend
        displayName: Deploy backend App Service
        pool:
          vmImage: ubuntu-latest
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: Deploy container to App Service
                  inputs:
                    azureSubscription: $(AZURE_SUBSCRIPTION)
                    appName: $(BACKEND_APP_SERVICE_NAME)
                    containers: $(ACR_LOGIN_SERVER)/$(imageRepository):$(tag)
